---
name: Refresh public profile metrics

"on":
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.repository_owner == 'Yo-DDV'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out profile repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Generate public profile assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: node scripts/generate-profile.mjs

      - name: Test the generator
        run: node --test scripts/generate-profile.test.mjs

      - name: Commit updated assets
        shell: bash
        run: |
          if git diff --quiet -- README.md assets; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- README.md assets/*.svg
          git commit -m "chore: refresh public profile metrics"
          git push
