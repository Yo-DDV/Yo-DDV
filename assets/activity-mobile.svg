    <text class="muted" x="157.5" y="361" text-anchor="middle" style="font-size:9px">Dec</text>
  </g>
  <g>
    <rect x="177" y="342.0" width="19" height="2.0" rx="4" fill="#2f81f7" />
    <text class="muted" x="186.5" y="361" text-anchor="middle" style="font-size:9px">Jan</text>
  </g>
  <g>
    <rect x="206" y="342.0" width="19" height="2.0" rx="4" fill="#2f81f7" />
    <text class="muted" x="215.5" y="361" text-anchor="middle" style="font-size:9px">Feb</text>
  </g>
  <g>
    <rect x="235" y="342.0" width="19" height="2.0" rx="4" fill="#2f81f7" />
    <text class="muted" x="244.5" y="361" text-anchor="middle" style="font-size:9px">Mar</text>
  </g>
  <g>
    <rect x="264" y="342.0" width="19" height="2.0" rx="4" fill="#2f81f7" />
    <text class="muted" x="273.5" y="361" text-anchor="middle" style="font-size:9px">Apr</text>
  </g>
  <g>
    <rect x="293" y="342.0" width="19" height="2.0" rx="4" fill="#2f81f7" />
    <text class="muted" x="302.5" y="361" text-anchor="middle" style="font-size:9px">May</text>
  </g>
  <g>
    <rect x="322" y="340.0" width="19" height="4.0" rx="4" fill="#2f81f7" />
    <text class="muted" x="331.5" y="361" text-anchor="middle" style="font-size:9px">Jun</text>
  </g>
  <g>
    <rect x="351" y="252.0" width="19" height="92.0" rx="4" fill="#2f81f7" />
