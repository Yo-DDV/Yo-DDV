<svg xmlns="http://www.w3.org/2000/svg" width="900" height="410" viewBox="0 0 900 410" role="img" aria-labelledby="title desc">
  <title id="title">Yoan De Vermont infrastructure capability map</title>
  <desc id="desc">Verified working areas across systems, networks, service edge, platforms and automation. No proficiency scores are used.</desc>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .title { fill: #1f2328; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #636c76; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .metric { fill: #1f2328; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #636c76; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { fill: #1f2328; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #636c76; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .title, .metric, .body { fill: #f0f6fc; }
      .subtitle, .label, .muted { fill: #8b949e; }
    }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="899" height="409" rx="8" />
  <text class="title" x="28" y="38">Infrastructure capability map</text>
  <text class="subtitle" x="28" y="60">Systems, networks, platforms and automation</text>
  <g>
    <rect class="panel" x="28" y="82" width="268" height="132" rx="8" />
    <rect x="28" y="82" width="268" height="4" rx="2" fill="#2f81f7" />
    <text class="title" x="46" y="114" style="font-size:16px">Systems</text>
    <circle cx="48" cy="136" r="3" fill="#2f81f7" />
    <text class="body" x="60" y="140">Linux service operations</text>
    <circle cx="48" cy="157" r="3" fill="#2f81f7" />
    <text class="body" x="60" y="161">Windows Server administration</text>
    <circle cx="48" cy="178" r="3" fill="#2f81f7" />
    <text class="body" x="60" y="182">OS hardening and patching</text>
    <circle cx="48" cy="199" r="3" fill="#2f81f7" />
    <text class="body" x="60" y="203">Recovery-focused maintenance</text>
  </g>
  <g>
    <rect class="panel" x="316" y="82" width="268" height="132" rx="8" />
    <rect x="316" y="82" width="268" height="4" rx="2" fill="#3fb950" />
    <text class="title" x="334" y="114" style="font-size:16px">Networks</text>
    <circle cx="336" cy="136" r="3" fill="#3fb950" />
    <text class="body" x="348" y="140">Cisco switching and routing</text>
    <circle cx="336" cy="157" r="3" fill="#3fb950" />
    <text class="body" x="348" y="161">Palo Alto policy review</text>
    <circle cx="336" cy="178" r="3" fill="#3fb950" />
    <text class="body" x="348" y="182">VLANs, trunks and ACL design</text>
    <circle cx="336" cy="199" r="3" fill="#3fb950" />
    <text class="body" x="348" y="203">Traffic-flow troubleshooting</text>
  </g>
  <g>
    <rect class="panel" x="604" y="82" width="268" height="132" rx="8" />
    <rect x="604" y="82" width="268" height="4" rx="2" fill="#d29922" />
    <text class="title" x="622" y="114" style="font-size:16px">Service edge</text>
    <circle cx="624" cy="136" r="3" fill="#d29922" />
    <text class="body" x="636" y="140">HAProxy, Nginx and Caddy</text>
    <circle cx="624" cy="157" r="3" fill="#d29922" />
    <text class="body" x="636" y="161">Traefik and Cloudflare edge</text>
    <circle cx="624" cy="178" r="3" fill="#d29922" />
    <text class="body" x="636" y="182">IPsec, WireGuard and OpenVPN</text>
    <circle cx="624" cy="199" r="3" fill="#d29922" />
    <text class="body" x="636" y="203">TLS, DNS and WAF exposure</text>
  </g>
  <g>
    <rect class="panel" x="28" y="234" width="412" height="146" rx="8" />
    <rect x="28" y="234" width="412" height="4" rx="2" fill="#a371f7" />
    <text class="title" x="46" y="266" style="font-size:16px">Platforms</text>
    <circle cx="48" cy="288" r="3" fill="#a371f7" />
    <text class="body" x="60" y="292">Proxmox and VMware estates</text>
    <circle cx="48" cy="309" r="3" fill="#a371f7" />
    <text class="body" x="60" y="313">OpenWrt router operations</text>
    <circle cx="48" cy="330" r="3" fill="#a371f7" />
    <text class="body" x="60" y="334">Docker and Nextcloud stacks</text>
    <circle cx="48" cy="351" r="3" fill="#a371f7" />
    <text class="body" x="60" y="355">VPS hosting and backups</text>
  </g>
  <g>
    <rect class="panel" x="460" y="234" width="412" height="146" rx="8" />
    <rect x="460" y="234" width="412" height="4" rx="2" fill="#f85149" />
    <text class="title" x="478" y="266" style="font-size:16px">Automation</text>
    <circle cx="480" cy="288" r="3" fill="#f85149" />
    <text class="body" x="492" y="292">Ansible automation</text>
    <circle cx="480" cy="309" r="3" fill="#f85149" />
    <text class="body" x="492" y="313">Bash tooling</text>
    <circle cx="480" cy="330" r="3" fill="#f85149" />
    <text class="body" x="492" y="334">Python scripting</text>
    <circle cx="480" cy="351" r="3" fill="#f85149" />
    <text class="body" x="492" y="355">GitHub Actions CI</text>
  </g>
</svg>
