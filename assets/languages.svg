<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Public automation and code mix</title>
  <desc id="desc">Language mix derived from 47 merged public pull requests over the trailing twelve months.</desc>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .title { fill: #1f2328; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #636c76; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .metric { fill: #1f2328; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #636c76; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { fill: #1f2328; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #636c76; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .title, .metric, .body { fill: #f0f6fc; }
      .subtitle, .label, .muted { fill: #8b949e; }
    }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="899" height="269" rx="8" />
  <text class="title" x="28" y="38">Public automation and code mix</text>
  <text class="subtitle" x="28" y="60">Changed lines in merged public pull requests / trailing twelve months</text>
  <rect x="28.00" y="86" width="416.97" height="22" fill="#f1e05a" />
  <rect x="444.97" y="86" width="290.12" height="22" fill="#dea584" />
  <rect x="735.09" y="86" width="111.26" height="22" fill="#89e051" />
  <rect x="846.35" y="86" width="21.36" height="22" fill="#7e7eff" />
  <rect x="867.70" y="86" width="4.30" height="22" fill="#8c959f" />
  <g>
    <circle cx="34" cy="138" r="6" fill="#f1e05a" />
    <text class="body" x="48" y="142">JavaScript</text>
    <text class="label" x="426" y="142" text-anchor="end">49.4% / 7,087 lines</text>
  </g>
  <g>
    <circle cx="456" cy="138" r="6" fill="#dea584" />
    <text class="body" x="470" y="142">Rust</text>
    <text class="label" x="848" y="142" text-anchor="end">34.4% / 4,931 lines</text>
  </g>
  <g>
    <circle cx="34" cy="168" r="6" fill="#89e051" />
    <text class="body" x="48" y="172">Shell</text>
    <text class="label" x="426" y="172" text-anchor="end">13.2% / 1,891 lines</text>
  </g>
  <g>
    <circle cx="456" cy="168" r="6" fill="#7e7eff" />
    <text class="body" x="470" y="172">Nix</text>
    <text class="label" x="848" y="172" text-anchor="end">2.5% / 363 lines</text>
  </g>
  <g>
    <circle cx="34" cy="198" r="6" fill="#8c959f" />
    <text class="body" x="48" y="202">Other</text>
    <text class="label" x="426" y="202" text-anchor="end">0.5% / 73 lines</text>
  </g>
  <text class="muted" x="28" y="250">Docs, lockfiles, vendored content and generated output are excluded. This is activity, not a proficiency score.</text>
</svg>
