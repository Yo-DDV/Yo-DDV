<svg xmlns="http://www.w3.org/2000/svg" width="900" height="270" viewBox="0 0 900 270" role="img" aria-labelledby="title desc">
  <title id="title">Public automation and code mix</title>
  <desc id="desc">Language mix derived from 116 merged public pull requests over the trailing twelve months.</desc>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .title { fill: #1f2328; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #636c76; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .metric { fill: #1f2328; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #636c76; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { fill: #1f2328; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #636c76; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .title, .metric, .body { fill: #f0f6fc; }
      .subtitle, .label, .muted { fill: #8b949e; }
    }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="899" height="269" rx="8" />
  <text class="title" x="28" y="38">Public automation and code mix</text>
  <text class="subtitle" x="28" y="60">Changed lines in merged public pull requests / trailing twelve months</text>
  <rect x="28.00" y="86" width="337.16" height="22" fill="#3178c6" />
  <rect x="365.16" y="86" width="280.71" height="22" fill="#f1e05a" />
  <rect x="645.87" y="86" width="130.48" height="22" fill="#dea584" />
  <rect x="776.35" y="86" width="56.18" height="22" fill="#89e051" />
  <rect x="832.53" y="86" width="24.19" height="22" fill="#cb171e" />
  <rect x="856.72" y="86" width="11.61" height="22" fill="#7e7eff" />
  <rect x="868.33" y="86" width="3.67" height="22" fill="#8c959f" />
  <g>
    <circle cx="34" cy="138" r="6" fill="#3178c6" />
    <text class="body" x="48" y="142">TypeScript</text>
    <text class="label" x="426" y="142" text-anchor="end">39.9% / 17,741 lines</text>
  </g>
  <g>
    <circle cx="456" cy="138" r="6" fill="#f1e05a" />
    <text class="body" x="470" y="142">JavaScript</text>
    <text class="label" x="848" y="142" text-anchor="end">33.3% / 14,771 lines</text>
  </g>
  <g>
    <circle cx="34" cy="168" r="6" fill="#dea584" />
    <text class="body" x="48" y="172">Rust</text>
    <text class="label" x="426" y="172" text-anchor="end">15.5% / 6,866 lines</text>
  </g>
  <g>
    <circle cx="456" cy="168" r="6" fill="#89e051" />
    <text class="body" x="470" y="172">Shell</text>
    <text class="label" x="848" y="172" text-anchor="end">6.7% / 2,956 lines</text>
  </g>
  <g>
    <circle cx="34" cy="198" r="6" fill="#cb171e" />
    <text class="body" x="48" y="202">YAML</text>
    <text class="label" x="426" y="202" text-anchor="end">2.9% / 1,273 lines</text>
  </g>
  <g>
    <circle cx="456" cy="198" r="6" fill="#7e7eff" />
    <text class="body" x="470" y="202">Nix</text>
    <text class="label" x="848" y="202" text-anchor="end">1.4% / 611 lines</text>
  </g>
  <g>
    <circle cx="34" cy="228" r="6" fill="#8c959f" />
    <text class="body" x="48" y="232">Other</text>
    <text class="label" x="426" y="232" text-anchor="end">0.4% / 193 lines</text>
  </g>
  <text class="muted" x="28" y="250">Docs, lockfiles, vendored content and generated output are excluded. This is activity, not a proficiency score.</text>
</svg>
