<svg xmlns="http://www.w3.org/2000/svg" width="420" height="410" viewBox="0 0 420 410" role="img" aria-labelledby="title desc">
  <title id="title">Public automation and code mix for mobile screens</title>
  <desc id="desc">A mobile-friendly language mix derived from 56 merged public pull requests over the trailing twelve months.</desc>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .title { fill: #1f2328; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #636c76; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .metric { fill: #1f2328; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #636c76; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { fill: #1f2328; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #636c76; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .title, .metric, .body { fill: #f0f6fc; }
      .subtitle, .label, .muted { fill: #8b949e; }
    }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="419" height="409" rx="8" />
  <text class="title" x="24" y="38" style="font-size:20px">Public automation and code mix</text>
  <text class="subtitle" x="24" y="60">Changed lines in merged public pull requests</text>
  <rect x="24.00" y="86" width="154.26" height="22" fill="#f1e05a" />
  <rect x="178.26" y="86" width="104.40" height="22" fill="#dea584" />
  <rect x="282.66" y="86" width="51.66" height="22" fill="#3178c6" />
  <rect x="334.32" y="86" width="40.36" height="22" fill="#89e051" />
  <rect x="374.68" y="86" width="12.78" height="22" fill="#cb171e" />
  <rect x="387.46" y="86" width="6.98" height="22" fill="#7e7eff" />
  <rect x="394.44" y="86" width="1.56" height="22" fill="#8c959f" />
  <g>
    <circle cx="30" cy="140" r="6" fill="#f1e05a" />
    <text class="body" x="44" y="144">JavaScript</text>
    <text class="label" x="396" y="144" text-anchor="end">41.5% / 8,994 lines</text>
  </g>
  <g>
    <circle cx="30" cy="170" r="6" fill="#dea584" />
    <text class="body" x="44" y="174">Rust</text>
    <text class="label" x="396" y="174" text-anchor="end">28.1% / 6,087 lines</text>
  </g>
  <g>
    <circle cx="30" cy="200" r="6" fill="#3178c6" />
    <text class="body" x="44" y="204">TypeScript</text>
    <text class="label" x="396" y="204" text-anchor="end">13.9% / 3,012 lines</text>
  </g>
  <g>
    <circle cx="30" cy="230" r="6" fill="#89e051" />
    <text class="body" x="44" y="234">Shell</text>
    <text class="label" x="396" y="234" text-anchor="end">10.8% / 2,353 lines</text>
  </g>
  <g>
    <circle cx="30" cy="260" r="6" fill="#cb171e" />
    <text class="body" x="44" y="264">YAML</text>
    <text class="label" x="396" y="264" text-anchor="end">3.4% / 745 lines</text>
  </g>
  <g>
    <circle cx="30" cy="290" r="6" fill="#7e7eff" />
    <text class="body" x="44" y="294">Nix</text>
    <text class="label" x="396" y="294" text-anchor="end">1.9% / 407 lines</text>
  </g>
  <g>
    <circle cx="30" cy="320" r="6" fill="#8c959f" />
    <text class="body" x="44" y="324">Other</text>
    <text class="label" x="396" y="324" text-anchor="end">0.4% / 91 lines</text>
  </g>
  <text class="muted" x="24" y="394">Activity, not a proficiency score. Exclusions match the desktop chart.</text>
</svg>
