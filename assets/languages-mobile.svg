<svg xmlns="http://www.w3.org/2000/svg" width="420" height="380" viewBox="0 0 420 380" role="img" aria-labelledby="title desc">
  <title id="title">Public automation and code mix for mobile screens</title>
  <desc id="desc">A mobile-friendly language mix derived from 150 merged public pull requests over the trailing twelve months.</desc>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .title { fill: #1f2328; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #636c76; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .metric { fill: #1f2328; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #636c76; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { fill: #1f2328; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #636c76; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .title, .metric, .body { fill: #f0f6fc; }
      .subtitle, .label, .muted { fill: #8b949e; }
    }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="419" height="379" rx="8" />
  <text class="title" x="24" y="38" style="font-size:20px">Public automation and code mix</text>
  <text class="subtitle" x="24" y="60">Changed lines in merged public pull requests</text>
  <rect x="24.00" y="86" width="197.24" height="22" fill="#3178c6" />
  <rect x="221.24" y="86" width="102.61" height="22" fill="#f1e05a" />
  <rect x="323.85" y="86" width="39.13" height="22" fill="#dea584" />
  <rect x="362.99" y="86" width="18.84" height="22" fill="#89e051" />
  <rect x="381.82" y="86" width="8.92" height="22" fill="#cb171e" />
  <rect x="390.74" y="86" width="5.26" height="22" fill="#8c959f" />
  <g>
    <circle cx="30" cy="140" r="6" fill="#3178c6" />
    <text class="body" x="44" y="144">TypeScript</text>
    <text class="label" x="396" y="144" text-anchor="end">53.0% / 34,606 lines</text>
  </g>
  <g>
    <circle cx="30" cy="170" r="6" fill="#f1e05a" />
    <text class="body" x="44" y="174">JavaScript</text>
    <text class="label" x="396" y="174" text-anchor="end">27.6% / 18,003 lines</text>
  </g>
  <g>
    <circle cx="30" cy="200" r="6" fill="#dea584" />
    <text class="body" x="44" y="204">Rust</text>
    <text class="label" x="396" y="204" text-anchor="end">10.5% / 6,866 lines</text>
  </g>
  <g>
    <circle cx="30" cy="230" r="6" fill="#89e051" />
    <text class="body" x="44" y="234">Shell</text>
    <text class="label" x="396" y="234" text-anchor="end">5.1% / 3,305 lines</text>
  </g>
  <g>
    <circle cx="30" cy="260" r="6" fill="#cb171e" />
    <text class="body" x="44" y="264">YAML</text>
    <text class="label" x="396" y="264" text-anchor="end">2.4% / 1,565 lines</text>
  </g>
  <g>
    <circle cx="30" cy="290" r="6" fill="#8c959f" />
    <text class="body" x="44" y="294">Other</text>
    <text class="label" x="396" y="294" text-anchor="end">1.4% / 922 lines</text>
  </g>
  <text class="muted" x="24" y="364">Activity, not a proficiency score. Exclusions match the desktop chart.</text>
</svg>
