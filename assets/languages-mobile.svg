<svg xmlns="http://www.w3.org/2000/svg" width="420" height="350" viewBox="0 0 420 350" role="img" aria-labelledby="title desc">
  <title id="title">Public automation and code mix for mobile screens</title>
  <desc id="desc">A mobile-friendly language mix derived from 51 merged public pull requests over the trailing twelve months.</desc>
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; }
    .panel { fill: #f6f8fa; stroke: #d8dee4; }
    .title { fill: #1f2328; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #636c76; font: 400 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .metric { fill: #1f2328; font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #636c76; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .body { fill: #1f2328; font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #636c76; font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; stroke: #30363d; }
      .panel { fill: #161b22; stroke: #30363d; }
      .title, .metric, .body { fill: #f0f6fc; }
      .subtitle, .label, .muted { fill: #8b949e; }
    }
  </style>
  <rect class="bg" x="0.5" y="0.5" width="419" height="349" rx="8" />
  <text class="title" x="24" y="38" style="font-size:20px">Public automation and code mix</text>
  <text class="subtitle" x="24" y="60">Changed lines in merged public pull requests</text>
  <rect x="24.00" y="86" width="180.51" height="22" fill="#f1e05a" />
  <rect x="204.51" y="86" width="132.26" height="22" fill="#dea584" />
  <rect x="336.77" y="86" width="48.78" height="22" fill="#89e051" />
  <rect x="385.55" y="86" width="8.76" height="22" fill="#7e7eff" />
  <rect x="394.31" y="86" width="1.69" height="22" fill="#8c959f" />
  <g>
    <circle cx="30" cy="140" r="6" fill="#f1e05a" />
    <text class="body" x="44" y="144">JavaScript</text>
    <text class="label" x="396" y="144" text-anchor="end">48.5% / 8,308 lines</text>
  </g>
  <g>
    <circle cx="30" cy="170" r="6" fill="#dea584" />
    <text class="body" x="44" y="174">Rust</text>
    <text class="label" x="396" y="174" text-anchor="end">35.6% / 6,087 lines</text>
  </g>
  <g>
    <circle cx="30" cy="200" r="6" fill="#89e051" />
    <text class="body" x="44" y="204">Shell</text>
    <text class="label" x="396" y="204" text-anchor="end">13.1% / 2,245 lines</text>
  </g>
  <g>
    <circle cx="30" cy="230" r="6" fill="#7e7eff" />
    <text class="body" x="44" y="234">Nix</text>
    <text class="label" x="396" y="234" text-anchor="end">2.4% / 403 lines</text>
  </g>
  <g>
    <circle cx="30" cy="260" r="6" fill="#8c959f" />
    <text class="body" x="44" y="264">Other</text>
    <text class="label" x="396" y="264" text-anchor="end">0.5% / 78 lines</text>
  </g>
  <text class="muted" x="24" y="334">Activity, not a proficiency score. Exclusions match the desktop chart.</text>
</svg>
